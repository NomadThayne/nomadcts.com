name: Fetch Payments News
 
"on":
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
 
jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install feedparser
 
      - name: Fetch news feeds
        run: python fetch-news.py
 
      - name: Commit news.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "chore: update payments news feed"
          git push
 


          
